<!DOCTYPE html>
<html lang="en">
<head>
<title>Roblox Hub</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>

/* =========================
   BASE SCALE
   ========================= */

body {
    font-size: 16px;
    line-height: 1.6;
}

/* NAV */
nav a { font-size: 14px; }
.logo { font-size: 18px; font-weight: 600; }

/* TITLES */
.container h1 {
    font-size: 30px;
    margin-bottom: 6px;
}

.container p {
    font-size: 14px;
    opacity: 0.8;
}

/* CARDS */
.card {
    padding: 18px;
}

.card h3 {
    font-size: 18px;
    margin-bottom: 6px;
}

.card p {
    font-size: 14px;
    opacity: 0.85;
}

/* FORM */
label {
    font-size: 14px;
    opacity: 0.85;
}

select, input {
    font-size: 14px;
    padding: 6px;
}

/* BUTTONS */
.btn {
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

/* GRID */
.grid {
    gap: 16px;
}

/* FOOTER */
footer {
    font-size: 13px;
    opacity: 0.7;
}

/* =========================
   FIXED LAYOUT SYSTEM
   ========================= */

/* SETTINGS CARD */
.settings {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* BUTTON GROUP FIX */
.button-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
}

/* PAGINATION FIX */
.pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 28px;
}

</style>

</head>

<body>

<nav>
    <div class="logo">SillyDev2026</div>

    <div>
        <a href="./index.html">Home</a>
        <a href="./about.html">About</a>
        <a href="./projects.html">Projects</a>
        <a href="./roblox.html">Roblox Hub</a>
        <a href="./links.html">Links</a>
        <a href="./contact.html">Contact</a>
    </div>
</nav>

<div class="container">

    <h1>🎮 Roblox Hub</h1>
    <p>Select category and browse your creations</p>

    <!-- SETTINGS -->
    <div class="card settings">

        <div>
            <label>Category</label><br>
            <select id="categorySelect">
                <option value="games">Games</option>
                <option value="modules">Modules</option>
            </select>
        </div>

        <div>
            <label>Items per page (5 - 25)</label><br>
            <input id="limitInput" type="number" value="6" min="5" max="25">
        </div>

        <div class="button-row">
            <button class="btn primary" id="applyBtn">Apply</button>
        </div>

    </div>

    <!-- GRID -->
    <div id="grid" class="grid"></div>

    <!-- PAGINATION -->
    <div class="pagination">
        <button class="btn dark" id="backBtn">⬅ Back</button>
        <span id="pageInfo"></span>
        <button class="btn dark" id="nextBtn">Next ➡</button>
    </div>

</div>

<footer>© 2026 SillyDev2026</footer>

<script>
const data = {
    games: [
        { title: "Game Example 1", desc: "A Roblox game", link: "#" },
        { title: "Game Example 2", desc: "Another Roblox game", link: "#" }
    ],
    modules: [
        { title: "Bnum", desc: "BnumModule", link: "https://create.roblox.com/store/asset/133072011264214/Bnum" },
        { title: "NetStream", desc: "Network handler system", link: "https://create.roblox.com/store/asset/110479081610454/NetworkHandler" }
        { title: "Bench Lua Code", desc: "Code for benchmarking Lua performance", link: "tools/bench.html" }
    ]
};

let page = 1;
let limit = 6;
let category = "games";

function getItems() {
    return data[category] || [];
}

function getMaxPage(items) {
    return Math.max(1, Math.ceil(items.length / limit));
}

function render() {
    const grid = document.getElementById("grid");
    const pageInfo = document.getElementById("pageInfo");

    const items = getItems();
    const max = getMaxPage(items);

    if (page > max) page = max;

    const slice = items.slice((page - 1) * limit, page * limit);

    grid.innerHTML = "";

    slice.forEach(item => {
        grid.innerHTML += `
        <div class="card">
            <h3>${item.title}</h3>
            <p>${item.desc}</p>
            <a class="btn primary" href="${item.link}" target="_blank">Open</a>
        </div>`;
    });

    pageInfo.innerText = `Page ${page} / ${max}`;
}

document.getElementById("categorySelect").onchange = () => {
    category = event.target.value;
    page = 1;
    render();
};

document.getElementById("applyBtn").onclick = () => {
    const v = parseInt(document.getElementById("limitInput").value);
    if (v >= 5 && v <= 25) {
        limit = v;
        page = 1;
        render();
    }
};

document.getElementById("nextBtn").onclick = () => {
    if (page < getMaxPage(getItems())) {
        page++;
        render();
    }
};

document.getElementById("backBtn").onclick = () => {
    if (page > 1) {
        page--;
        render();
    }
};

render();
</script>

</body>
</html>
