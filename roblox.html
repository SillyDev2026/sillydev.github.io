<!DOCTYPE html>
<html lang="en">
<head>
<title>Roblox Hub</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
/* =========================
   CLEAN TYPOGRAPHY SCALE
   ========================= */

body {
    font-size: 16px;
    line-height: 1.6;
}

/* NAV */
nav a {
    font-size: 14px;
}

.logo {
    font-size: 18px;
    font-weight: 600;
}

/* PAGE TITLE */
.container h1 {
    font-size: 30px;
    margin-bottom: 6px;
}

.container p {
    font-size: 14px;
    opacity: 0.8;
}

/* CARD HEADINGS */
.card h2 {
    font-size: 22px;
    margin-bottom: 6px;
}

.card h3 {
    font-size: 18px;
    margin-bottom: 6px;
}

.card p {
    font-size: 14px;
    opacity: 0.85;
}

/* FORM */
label {
    font-size: 14px;
    opacity: 0.85;
}

select, input {
    font-size: 14px;
}

/* BUTTONS */
.btn {
    font-size: 14px;
}

/* GRID spacing */
.grid {
    gap: 16px;
}

/* PAGINATION */
#pageInfo {
    font-size: 14px;
    opacity: 0.8;
}

/* FOOTER */
footer {
    font-size: 13px;
    opacity: 0.7;
}

/* SMALL UI CLEANUP */
.card {
    padding: 18px;
}

button {
    cursor: pointer;
}
</style>

</head>

<body>

<nav>
    <div class="logo">SillyDev2026</div>

    <div>
        <a href="./index.html">Home</a>
        <a href="./about.html">About</a>
        <a href="./projects.html">Projects</a>
        <a href="./roblox.html">Roblox Hub</a>
        <a href="./links.html">Links</a>
        <a href="./contact.html">Contact</a>
    </div>
</nav>

<div class="container">

    <h1>🎮 Roblox Hub</h1>
    <p>Select category and browse your creations</p>

    <!-- SETTINGS -->
    <div class="card">

        <label>Category</label><br>
        <select id="categorySelect">
            <option value="games">Games</option>
            <option value="modules">Modules</option>
        </select>

        <br><br>

        <label>Items per page (5 - 25)</label><br>
        <input id="limitInput" type="number" value="6" min="5" max="25">

        <div style="margin-top:15px;">
            <button class="btn primary" id="applyBtn">Apply</button>
        </div>

    </div>

    <!-- GRID -->
    <div id="grid" class="grid"></div>

    <!-- PAGINATION -->
    <div style="text-align:center; margin-top:28px;">
        <button class="btn dark" id="backBtn">⬅ Back</button>
        <span id="pageInfo" style="margin:0 12px;"></span>
        <button class="btn dark" id="nextBtn">Next ➡</button>
    </div>

</div>

<footer>© 2026 SillyDev2026</footer>

<script>
/* ================= DATA ================= */
const data = {
    games: [
        { title: "Game Example 1", desc: "A Roblox game", link: "#" },
        { title: "Game Example 2", desc: "Another Roblox game", link: "#" }
    ],

    modules: [
        { title: "Bnum", desc: "BnumModule", link: "https://create.roblox.com/store/asset/133072011264214/Bnum" },
        { title: "NetStream", desc: "Network handler system", link: "https://create.roblox.com/store/asset/110479081610454/NetworkHandler" }
    ]
};

/* ================= STATE ================= */
let page = 1;
let limit = 6;
let category = "games";

/* ================= CORE ================= */
function getItems() {
    return data[category] || [];
}

function getMaxPage(items) {
    return Math.max(1, Math.ceil(items.length / limit));
}

/* ================= RENDER ================= */
function render() {
    const grid = document.getElementById("grid");
    const pageInfo = document.getElementById("pageInfo");

    const items = getItems();
    const maxPage = getMaxPage(items);

    if (page > maxPage) page = maxPage;

    const start = (page - 1) * limit;
    const slice = items.slice(start, start + limit);

    grid.innerHTML = "";

    slice.forEach(item => {
        grid.innerHTML += `
        <div class="card">
            <h3>${item.title}</h3>
            <p>${item.desc}</p>
            <a class="btn primary" href="${item.link}" target="_blank" rel="noopener noreferrer">
                Open
            </a>
        </div>`;
    });

    pageInfo.innerText = `Page ${page} / ${maxPage}`;
}

/* ================= ACTIONS ================= */
function changeCategory() {
    category = document.getElementById("categorySelect").value;
    page = 1;
    render();
}

function nextPage() {
    const max = getMaxPage(getItems());
    if (page < max) {
        page++;
        render();
    }
}

function prevPage() {
    if (page > 1) {
        page--;
        render();
    }
}

function applyLimit() {
    const val = parseInt(document.getElementById("limitInput").value);

    if (isNaN(val) || val < 5 || val > 25) {
        alert("Limit must be between 5 and 25");
        return;
    }

    limit = val;
    page = 1;
    render();
}

/* ================= INIT ================= */
window.onload = function () {
    document.getElementById("categorySelect").addEventListener("change", changeCategory);
    document.getElementById("applyBtn").addEventListener("click", applyLimit);
    document.getElementById("nextBtn").addEventListener("click", nextPage);
    document.getElementById("backBtn").addEventListener("click", prevPage);

    render();
};
</script>

</body>
</html>
