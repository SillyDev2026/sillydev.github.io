<!DOCTYPE html>
<html lang="en">
<head>
<title>Roblox Hub</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <div class="logo">SillyDev2026</div>

    <div>
        <a href="./index.html">Home</a>
        <a href="./about.html">About</a>
        <a href="./projects.html">Projects</a>
        <a href="./roblox.html">Roblox Hub</a>
        <a href="./links.html">Links</a>
        <a href="./contact.html">Contact</a>
    </div>
</nav>

<div class="container">

    <h1>🎮 Roblox Hub</h1>
    <p>Select category and browse your creations</p>

    <div class="card">

        <label>Category:</label>
        <select id="categorySelect" onchange="changeCategory()">
            <option value="games">Games</option>
            <option value="modules">Modules</option>
        </select>

        <br><br>

        <label>Items per page (5 - 25):</label>
        <input id="limitInput" type="number" value="6" min="5" max="25">
        <button class="btn primary" onclick="applyLimit()">Apply</button>

    </div>

    <div id="grid" class="grid"></div>

    <div style="text-align:center; margin-top:30px;">
        <button class="btn dark" onclick="prevPage()">⬅ Back</button>
        <span id="pageInfo" style="margin:0 15px;"></span>
        <button class="btn dark" onclick="nextPage()">Next ➡</button>
    </div>

</div>

<footer>© 2026 SillyDev2026</footer>

<script>

const data = {
    games: [
        { title: "Game Example 1", desc: "A Roblox game", link: "#" },
        { title: "Game Example 2", desc: "Another Roblox game", link: "#" }
    ],

    modules: [
        { title: "Bnum", desc: "BnumModule", link: "https://create.roblox.com/store/asset/133072011264214/Bnum" },
        { title: "NetStream", desc: "Network handler system", link: "https://create.roblox.com/store/asset/110479081610454/NetworkHandler" }
    ]
};

let page = 1;
let limit = 6;
let category = "games";

function getCurrentData() {
    return data[category];
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const items = getCurrentData();

    const start = (page - 1) * limit;
    const end = start + limit;

    const slice = items.slice(start, end);

    slice.forEach(item => {
        grid.innerHTML += `
        <div class="card">
            <h2>${item.title}</h2>
            <p>${item.desc}</p>
            <a class="btn primary" href="${item.link}" target="_blank" rel="noopener noreferrer">
                Open
            </a>
        </div>`;
    });

    document.getElementById("pageInfo").innerText =
        `Page ${page} / ${Math.ceil(items.length / limit)}`;
}

function changeCategory() {
    category = document.getElementById("categorySelect").value;
    page = 1;
    render();
}

function nextPage() {
    const items = getCurrentData();
    if (page < Math.ceil(items.length / limit)) {
        page++;
        render();
    }
}

function prevPage() {
    if (page > 1) {
        page--;
        render();
    }
}

function applyLimit() {
    const val = parseInt(document.getElementById("limitInput").value);

    if (val >= 5 && val <= 25) {
        limit = val;
        page = 1;
        render();
    } else {
        alert("Limit must be between 5 and 25");
    }
}

render();

</script>

</body>
</html>
