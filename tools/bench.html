<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bench Lua Code</title>

<style>
body {
    font-size: 16px;
    line-height: 1.6;
    background:#0b1220;
    color:white;
    font-family: monospace;
}

.container {
    width: min(900px, 92%);
    margin: auto;
    padding: 40px 0;
}

textarea {
    width:100%;
    height:260px;
    background:#111827;
    color:white;
    border-radius:12px;
    padding:12px;
}

button {
    margin-top:10px;
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.primary { background:#38bdf8; }
.dark { background:#333; color:white; }

pre {
    margin-top:15px;
    background:#000;
    padding:12px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>Lua Bench Simulator</h1>

<textarea id="code">
function floor(val)
    return val - (val % val)
end

benchFunction("Test", function()
    floor(10)
end, 100000)
</textarea>

<br>

<button class="primary" onclick="runBench()">Run</button>
<button class="dark" onclick="clearOutput()">Clear</button>

<pre id="output"></pre>

</div>

<script>

/* ================= OUTPUT ================= */

function log(msg){
    document.getElementById("output").textContent += msg + "\n";
}

function clearOutput(){
    document.getElementById("output").textContent = "";
}

/* ================= LUA STORAGE ================= */

const Lua = {
    functions: {}
};

/* register function */
function register(name, fn){
    Lua.functions[name] = fn;
}

/* ================= BENCH ================= */

function benchFunction(label, func, iterations=1e5){

    for(let i=0;i<1000;i++) func();

    const start = performance.now();

    for(let i=0;i<iterations;i++){
        func();
    }

    const end = performance.now();

    const seconds = (end - start)/1000;

    log(label + " took " + seconds.toFixed(6) + "s");
    log(label + " avg/op: " + ((seconds/iterations)*1e6).toFixed(6) + " µs");
}

/* ================= LUA PARSER (SAFE SIMPLE) ================= */

function runBench(){

    clearOutput();

    const code = document.getElementById("code").value;

    Lua.functions = {};

    /* 1. parse functions */
    const funcRegex = /function\s+(\w+)\s*\((.*?)\)\s*([\s\S]*?)end/g;

    let match;

    while((match = funcRegex.exec(code)) !== null){

        const name = match[1];
        const params = match[2];
        const body = match[3];

        const jsBody = body
            .replace(/local\s+/g,"let ")
            .replace(/%/g," % ")
            .replace(/then/g,"")
            .replace(/end/g,"");

        const fn = new Function(params, jsBody);

        register(name, fn);
    }

    /* 2. replace Lua calls inside bench */
    const benchRegex = /benchFunction\("(.+?)",\s*function\(\)\s*([\s\S]*?)end\s*,\s*(\d+)\)/;

    const b = code.match(benchRegex);

    if(!b){
        log("No benchFunction found");
        return;
    }

    const label = b[1];
    let body = b[2];
    const iterations = parseInt(b[3]);

    /* replace Lua calls */
    const funcNames = Object.keys(Lua.functions);

    const benchFn = new Function(`
        return function(){
            ${body.replace(/\b(\w+)\b/g, (m)=>{
                return Lua.functions[m] ? `Lua.functions["${m}"]` : m;
            })}
        }
    `)();

    benchFunction(label, benchFn, iterations);
}

</script>

</body>
</html>
