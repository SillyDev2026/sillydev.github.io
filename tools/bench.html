<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bench Lua Code</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body {
    font-size: 16px;
    line-height: 1.6;
}

.container {
    width: min(900px, 92%);
    margin: auto;
    padding: 60px 0;
}

h1 {
    font-size: 30px;
    margin-bottom: 8px;
}

p {
    opacity: 0.8;
    font-size: 14px;
}

.card {
    margin-top: 20px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
}

textarea {
    width: 100%;
    height: 260px;
    background: rgba(0,0,0,0.45);
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px;
    font-family: monospace;
    font-size: 13px;
    resize: vertical;
}

button {
    margin-top: 10px;
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 700;
}

.primary {
    background: #38bdf8;
    color: #0b1220;
}

.dark {
    background: rgba(255,255,255,0.08);
    color: white;
}

pre {
    margin-top: 15px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
    white-space: pre-wrap;
    font-family: monospace;
}
</style>

</head>

<body>

<div class="container">

<h1>⚡ Lua Bench Simulator</h1>
<p>Write Lua-style code. It will be converted and benchmarked in JS.</p>

<div class="card">

<textarea id="code">
benchFunction("Test", function()
    local x = 1 + 2 + 3
    local y = x * 2
end, 100000)
</textarea>

<br>

<button class="primary" onclick="runBench()">Run Bench</button>
<button class="dark" onclick="clearOutput()">Clear</button>

<pre id="output"></pre>

</div>

</div>

<script>

/* =========================
   OUTPUT
========================= */

function log(msg) {
    document.getElementById("output").textContent += msg + "\n";
}

function clearOutput() {
    document.getElementById("output").textContent = "";
}

/* =========================
   LUA → JS TRANSLATOR
   (simple but effective)
========================= */

function luaToJs(code) {

    return code
        .replace(/local\s+/g, "let ")
        .replace(/print/g, "log")
        .replace(/end/g, "")
        .replace(/--.*$/gm, "") // remove comments
        .replace(/then/g, "{")
        .replace(/function\s*\(/g, "function(");
}

function benchFunction(label, func, iterations = 1e6) {

    for (let i = 0; i < 1000; i++) func();

    const start = performance.now();

    for (let i = 0; i < iterations; i++) {
        func();
    }

    const elapsed = (performance.now() - start) / 1000;

    log(`${label} took ${elapsed.toFixed(6)}s`);
    log(`${label} avg/op: ${((elapsed / iterations) * 1e6).toFixed(6)} µs`);
}

function runBench() {

    clearOutput();

    let luaCode = document.getElementById("code").value;

    try {

        let jsCode = luaToJs(luaCode);

        let runnable = new Function("benchFunction", "log", jsCode);

        runnable(benchFunction, log);

    } catch (e) {
        log("Error: " + e.message);
    }
}

</script>

</body>
</html>
