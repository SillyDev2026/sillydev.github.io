<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lua Bench Tool</title>

<style>
body {
    margin:0;
    background:#0b1220;
    color:white;
    font-family: monospace;
}

.container {
    width:min(1000px,92%);
    margin:auto;
    padding:40px 0;
}

h1 {
    font-size:28px;
    color:#38bdf8;
}

.codebox {
    background: rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:16px;
    min-height:260px;
    white-space:pre;
    outline:none;
    overflow:auto;
}

button {
    margin-top:12px;
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
}

.primary { background:#38bdf8; color:#0b1220; }
.dark { background:#222; color:white; }

pre {
    margin-top:15px;
    background:#000;
    padding:12px;
    border-radius:12px;
    min-height:120px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Lua Bench Tool (Stable)</h1>

<div id="editor" class="codebox" contenteditable="true">
function floor(val)
    return val - (val % val)
end

function add(a, b)
    return a + b
end

benchFunction("Test", function()
    floor(10)
    add(5, 7)
end, 100000)
</div>

<button class="primary" onclick="runBench()">Run Bench</button>
<button class="dark" onclick="clearOutput()">Clear</button>

<pre id="output"></pre>

</div>

<script>

/* ================= OUTPUT ================= */

function log(msg){
    document.getElementById("output").textContent += msg + "\n";
}

function clearOutput(){
    document.getElementById("output").textContent = "";
}

/* ================= LUA RUNTIME ================= */

const Lua = {
    functions: Object.create(null)
};

function register(name, fn){
    Lua.functions[name] = fn;
}

/* ================= BENCH ENGINE ================= */

function benchFunction(label, func, iterations = 100000){

    for(let i=0;i<1000;i++) func();

    const start = performance.now();

    for(let i=0;i<iterations;i++){
        func();
    }

    const sec = (performance.now() - start) / 1000;

    log(label + " took " + sec.toFixed(6) + "s");
    log(label + " avg/op: " + ((sec / iterations) * 1e6).toFixed(6) + " µs");
}

/* ================= LUA PARSER ================= */

function parseLua(code){

    Lua.functions = Object.create(null);

    const fnRegex =
        /function\s+(\w+)\s*\((.*?)\)\s*([\s\S]*?)end/g;

    let m;

    while((m = fnRegex.exec(code)) !== null){

        const name = m[1];
        const params = m[2];
        const body = m[3];

        const jsBody = body
            .replace(/local\s+/g, "")
            .replace(/--.*$/gm, "");

        const fn = new Function(params, jsBody);

        register(name, fn);
    }

    const benchRegex =
        /benchFunction\("(.+?)",\s*function\(\)\s*([\s\S]*?)end\s*,\s*(\d+)\)/;

    const b = code.match(benchRegex);

    if(!b) return null;

    return {
        label: b[1],
        body: b[2],
        iterations: Number(b[3])
    };
}

/* ================= EXECUTION ================= */

function runBench(){

    clearOutput();

    const code = document.getElementById("editor").innerText;

    try {

        const parsed = parseLua(code);

        if(!parsed){
            log("No benchFunction found");
            return;
        }

        /* 🔥 KEY FIX: inject ALL Lua functions automatically */
        const fn = new Function("Lua", `
            return function(){

                const env = Lua.functions;

                ${parsed.body}

            }
        `)(Lua);

        benchFunction(parsed.label, fn, parsed.iterations);

    } catch(e){
        log("Error: " + e.message);
    }
}

</script>

</body>
</html>
