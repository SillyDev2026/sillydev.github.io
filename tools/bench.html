<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lua Bench Tool</title>

<style>
body {
    margin:0;
    background:#0b1220;
    color:white;
    font-family: monospace;
}

.container {
    width:min(1000px,92%);
    margin:auto;
    padding:40px 0;
}

h1 {
    font-size:28px;
    color:#38bdf8;
}

.editor {
    background: rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:16px;
    min-height:260px;
    outline:none;
    white-space:pre;
}

button {
    margin-top:12px;
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
}

.primary { background:#38bdf8; color:#0b1220; }
.dark { background:#222; color:white; }

pre {
    margin-top:15px;
    background:#000;
    padding:12px;
    border-radius:12px;
    min-height:120px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Lua Bench Tool (Runtime Engine)</h1>

<div id="editor" class="editor" contenteditable="true">
function floor(val)
    return val - (val % val)
end

function add(a, b)
    return a + b
end

benchFunction("Test", function()
    add(floor(10), 5)
end, 100000)
</div>

<button class="primary" onclick="runBench()">Run Bench</button>
<button class="dark" onclick="clearOutput()">Clear</button>

<pre id="output"></pre>

</div>

<script>

function log(msg){
    document.getElementById("output").textContent += msg + "\n";
}

function clearOutput(){
    document.getElementById("output").textContent = "";
}

/* ================= LUA ENV ================= */

function createEnv(parent = null){
    return {
        vars: Object.create(parent ? parent.vars : null),
        funcs: Object.create(parent ? parent.funcs : null)
    };
}

/* ================= FUNCTION PARSER ================= */

function parseFunctions(code, env){

    const fnRegex = /function\s+(\w+)\s*\((.*?)\)\s*([\s\S]*?)end/g;

    let m;

    while ((m = fnRegex.exec(code)) !== null) {

        const name = m[1];
        const params = m[2].split(",").map(x => x.trim()).filter(Boolean);
        const body = m[3];

        env.funcs[name] = (...args) => {

            const child = createEnv(env);

            params.forEach((p, i) => {
                child.vars[p] = args[i];
            });

            return execute(body, child);
        };
    }
}

/* ================= EXPRESSION EVALUATOR ================= */

function evalExpr(expr, env){
    return new Function("vars", "funcs", `
        with(vars){
            with(funcs){
                return (${expr});
            }
        }
    `)(env.vars, env.funcs);
}

/* ================= EXECUTOR ================= */

function execute(code, env){

    const lines = code.split("\n").map(l => l.trim()).filter(Boolean);

    let i = 0;

    while (i < lines.length) {

        const line = lines[i];

        /* local */
        if (line.startsWith("local ")) {

            const m = line.match(/local\s+(\w+)\s*=\s*(.+)/);
            env.vars[m[1]] = evalExpr(m[2], env);
        }

        /* function call */
        else if (line.includes("(") && line.includes(")")) {

            const name = line.split("(")[0].trim();
            const argsRaw = line.match(/\((.*)\)/)[1];

            const args = argsRaw
                .split(",")
                .map(a => evalExpr(a.trim(), env));

            if (env.funcs[name]) {
                env.funcs[name](...args);
            }
        }

        i++;
    }
}

/* ================= BENCH ================= */

function benchFunction(label, fn, iterations){

    for (let i = 0; i < 1000; i++) fn();

    const start = performance.now();

    for (let i = 0; i < iterations; i++) fn();

    const sec = (performance.now() - start) / 1000;

    log(label + " took " + sec.toFixed(6) + "s");
    log(label + " avg/op: " + ((sec / iterations) * 1e6).toFixed(6) + " µs");
}

/* ================= RUNNER ================= */

function runBench(){

    clearOutput();

    const code = document.getElementById("editor").innerText;

    const env = createEnv();

    env.funcs.benchFunction = benchFunction;

    parseFunctions(code, env);

    const benchMatch =
        code.match(/benchFunction\("(.+?)",\s*function\(\)\s*([\s\S]*?)end\s*,\s*(\d+)\)/);

    if (!benchMatch){
        log("No benchFunction found");
        return;
    }

    const label = benchMatch[1];
    const body = benchMatch[2];
    const iterations = Number(benchMatch[3]);

    const fn = () => execute(body, env);

    benchFunction(label, fn, iterations);
}

</script>

</body>
</html>
