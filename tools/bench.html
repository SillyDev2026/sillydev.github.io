<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lua Bench Tool</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<style>
body {
    margin:0;
    background:#0b1220;
    color:white;
    font-family: monospace;
}

/* layout */
.container {
    width:min(1000px,92%);
    margin:auto;
    padding:40px 0;
}

h1 {
    font-size:28px;
    margin-bottom:10px;
    color:#38bdf8;
}

.code-wrap {
    position: relative;
    margin-top: 20px;
}

.editor {
    background: rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:16px;
    min-height:260px;
    outline:none;
    white-space:pre;
    overflow:auto;
}

/* buttons */
.btn {
    margin-top:12px;
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
}

.primary { background:#38bdf8; color:#0b1220; }
.dark { background:#222; color:white; }

pre {
    margin-top:15px;
    background:#000;
    padding:12px;
    border-radius:12px;
    min-height:120px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Lua Bench Tool</h1>

<p>Lua-style editor + benchmark runtime</p>

<div class="code-wrap">

<pre id="editor" class="editor" contenteditable="true">
function floor(val)
    return val - (val % val)
end

benchFunction("Test", function()
    floor(10)
end, 100000)
</pre>

<button class="btn primary" onclick="runBench()">Run Bench</button>
<button class="btn dark" onclick="clearOutput()">Clear</button>

<pre id="output"></pre>

</div>
</div>

<script>

function log(msg){
    document.getElementById("output").textContent += msg + "\n";
}

function clearOutput(){
    document.getElementById("output").textContent = "";
}

const Lua = {
    functions: {}
};

function register(name, fn){
    Lua.functions[name] = fn;
}

function benchFunction(label, func, iterations=1e5){

    for(let i=0;i<1000;i++) func();

    const start = performance.now();

    for(let i=0;i<iterations;i++){
        func();
    }

    const seconds = (performance.now() - start)/1000;

    log(label + " took " + seconds.toFixed(6) + "s");
    log(label + " avg/op: " + ((seconds/iterations)*1e6).toFixed(6) + " µs");
}

function parseLua(code){

    Lua.functions = {};

    const funcRegex = /function\s+(\w+)\s*\((.*?)\)\s*([\s\S]*?)end/g;

    let match;

    while((match = funcRegex.exec(code)) !== null){

        const name = match[1];
        const params = match[2];
        const body = match[3];

        const jsBody = body
            .replace(/local\s+/g,"let ")
            .replace(/%/g," % ");

        const fn = new Function(params, jsBody);

        register(name, fn);
    }

    // bench parser
    const benchRegex =
    /benchFunction\("(.+?)",\s*function\(\)\s*([\s\S]*?)end\s*,\s*(\d+)\)/;

    const b = code.match(benchRegex);

    if(!b) return null;

    return {
        label: b[1],
        body: b[2],
        iterations: parseInt(b[3])
    };
}

function runBench(){

    clearOutput();

    const code = document.getElementById("editor").innerText;

    try {

        const parsed = parseLua(code);

        if(!parsed){
            log("No benchFunction found");
            return;
        }

        const fn = new Function(`
            return function(){
                ${parsed.body.replace(/\b(\w+)\b/g, (m)=>{
                    return Lua.functions[m]
                        ? `Lua.functions["${m}"]()`
                        : m;
                })}
            }
        `)();

        benchFunction(parsed.label, fn, parsed.iterations);

    } catch(e){
        log("Error: " + e.message);
    }
}

</script>

</body>
</html>
